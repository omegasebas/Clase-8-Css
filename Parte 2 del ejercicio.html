<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Formulario de contacto</title>

  <style>
body {
  font-family: Verdana, Geneva, Tahoma, sans-serif, sans-serif;
  margin: 30px;
  line-height: 1.5;
}

h1 {
  color: #ec0e0e;
}

p {
  font-size: 16px;
}
section {
  margin-top: 20px;
}

form {
  border: 1px solid #ccc;
  padding: 15px;
}

label {
  display: block;
  margin-top: 10px;
}

input {
  display: block;
  margin-top: 5px;
  margin-bottom: 10px;
  padding: 8px;
  width: 100%;
  max-width: 300px;
}

button {
  margin-top: 10px;
  padding: 10px 15px;
}

</style>
</head>

<body>

    <p>Por favor completa este formulario.</p>

    <section>
      <form>
  
        <label>Nombre completo:</label>
        <input type="text">
        <label>Correo electrónico:</label>
      <input type="email">
      <button>Enviar</button>

    </form>
  </section>

</body>
</html>
